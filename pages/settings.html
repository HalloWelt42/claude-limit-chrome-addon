<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="pageTitle_settings"></title>
  <link rel="stylesheet" href="page-common.css">
</head>
<body>
  <div class="page-container">
    <header class="page-header">
      <button id="btn-back" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h1 data-i18n="settingsTitle"></h1>
    </header>

    <main class="page-content">
      <!-- How it works -->
      <section class="card">
        <h2 class="card-title" data-i18n="howItWorks"></h2>
        <p class="card-text" data-i18n-html="howItWorksText1"></p>
        <p class="card-text" style="margin-top: 8px;" data-i18n-html="howItWorksText2"></p>
      </section>

      <!-- Prerequisites -->
      <section class="card">
        <h2 class="card-title" data-i18n="prerequisites"></h2>
        <ul class="checklist">
          <li data-i18n="prereqPro"></li>
          <li data-i18n="prereqLoggedIn"></li>
          <li data-i18n="prereqCookies"></li>
        </ul>
      </section>

      <!-- Data -->
      <section class="card">
        <h2 class="card-title" data-i18n="dataSection"></h2>

        <div class="data-row">
          <span data-i18n="storedData"></span>
          <span id="storage-size">--</span>
        </div>
        <div class="data-row">
          <span data-i18n="capturedTopics"></span>
          <span id="topic-count">--</span>
        </div>
        <div class="data-row">
          <span data-i18n="historyEntries"></span>
          <span id="history-count">--</span>
        </div>

        <div class="button-row" style="margin-top: 16px;">
          <button id="btn-export" class="btn-secondary" data-i18n="exportBtn"></button>
          <button id="btn-clear" class="btn-danger" data-i18n="deleteAllData"></button>
        </div>
      </section>

      <!-- Debug -->
      <section class="card">
        <details>
          <summary class="card-title" style="cursor: pointer;" data-i18n="debugInfo"></summary>
          <pre id="debug-info" class="debug-pre" data-i18n="loading"></pre>
        </details>
      </section>

      <!-- Version -->
      <div class="version-info" id="version-info"></div>
    </main>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="settings.js"></script>
</body>
</html>
