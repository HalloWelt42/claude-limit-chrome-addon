<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard f&#252;r Claude &ndash; Unterst&uuml;tzen</title>
  <link rel="stylesheet" href="donate.css">
</head>
<body>
  <div class="donate-page">
    <!-- Header -->
    <div class="donate-header">
      <span class="icon">&#x2615;</span>
      <h1>Made with &#x2764;&#xFE0F; in Sachsen-Anhalt</h1>
      <p>Open Source aus Sachsen-Anhalt.<br>Kein Tracking, keine Werbung, keine Kompromisse.</p>
    </div>

    <!-- Ko-fi Primary -->
    <a id="kofi-btn" href="" target="_blank" rel="noopener" class="kofi-btn">
      <span class="kofi-icon">&#x2615;</span>
      <span>Ko-fi &ndash; Kaffee spendieren</span>
    </a>

    <!-- Crypto -->
    <p class="crypto-label">Oder per Kryptow&auml;hrung:</p>

    <div class="crypto-tabs">
      <button class="crypto-tab active" data-crypto="btc">
        <span class="coin-icon">&#x20BF;</span>
        <span>Bitcoin</span>
      </button>
      <button class="crypto-tab" data-crypto="doge">
        <span class="coin-icon">&#xD0;</span>
        <span>Dogecoin</span>
      </button>
      <button class="crypto-tab" data-crypto="eth">
        <span class="coin-icon">&#x039E;</span>
        <span>Ethereum</span>
      </button>
    </div>

    <!-- BTC -->
    <div class="crypto-content active" id="crypto-btc">
      <div class="crypto-box">
        <div class="qr-code" id="btc-qr"><span class="placeholder">QR</span></div>
        <div class="crypto-details">
          <p class="crypto-name">Bitcoin (BTC)</p>
          <p class="crypto-address" id="btc-address"></p>
          <button class="copy-btn" data-coin="btc">&#x1F4CB; <span class="copy-text">Adresse kopieren</span></button>
        </div>
      </div>
    </div>

    <!-- DOGE -->
    <div class="crypto-content" id="crypto-doge">
      <div class="crypto-box">
        <div class="qr-code" id="doge-qr"><span class="placeholder">QR</span></div>
        <div class="crypto-details">
          <p class="crypto-name">Dogecoin (DOGE)</p>
          <p class="crypto-address" id="doge-address"></p>
          <button class="copy-btn" data-coin="doge">&#x1F4CB; <span class="copy-text">Adresse kopieren</span></button>
        </div>
      </div>
    </div>

    <!-- ETH -->
    <div class="crypto-content" id="crypto-eth">
      <div class="crypto-box">
        <div class="qr-code" id="eth-qr"><span class="placeholder">QR</span></div>
        <div class="crypto-details">
          <p class="crypto-name">Ethereum (ETH)</p>
          <p class="crypto-address" id="eth-address"></p>
          <button class="copy-btn" data-coin="eth">&#x1F4CB; <span class="copy-text">Adresse kopieren</span></button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="donate-footer">
      Danke f&uuml;r deine Unterst&uuml;tzung! &#x2764;&#xFE0F;
    </div>
  </div>

  <script src="donate-config.js"></script>
  <script src="donate.js"></script>
</body>
</html>
