<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historie - Dashboard f&uuml;r Claude</title>
  <link rel="stylesheet" href="page-common.css">
</head>
<body>
  <div class="page-container">
    <header class="page-header">
      <button id="btn-back" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h1>Verbrauchs-Historie</h1>
    </header>

    <main class="page-content">
      <!-- Zeitraum -->
      <section class="card">
        <h2 class="card-title">Zeitraum</h2>

        <div class="date-range">
          <div class="form-group">
            <label for="date-from">Von</label>
            <input type="date" id="date-from">
          </div>
          <div class="form-group">
            <label for="date-to">Bis</label>
            <input type="date" id="date-to">
          </div>
          <button id="btn-apply" class="btn-primary">Anwenden</button>
        </div>

        <div class="preset-buttons">
          <button class="btn-preset" data-range="7">7 Tage</button>
          <button class="btn-preset" data-range="30">30 Tage</button>
          <button class="btn-preset" data-range="90">90 Tage</button>
          <button class="btn-preset" data-range="all">Alles</button>
        </div>
      </section>

      <!-- Statistiken -->
      <section class="card">
        <h2 class="card-title">Verbrauch im Zeitraum</h2>

        <div class="stats-grid">
          <div class="stat-item">
            <div id="stat-syncs" class="stat-value">0</div>
            <div class="stat-label">Sync-Punkte</div>
          </div>
          <div class="stat-item">
            <div id="stat-days" class="stat-value">0</div>
            <div class="stat-label">Aktive Tage</div>
          </div>
          <div class="stat-item">
            <div id="stat-max-5h" class="stat-value">0%</div>
            <div class="stat-label">Max 5h-Limit</div>
          </div>
          <div class="stat-item">
            <div id="stat-max-7d" class="stat-value">0%</div>
            <div class="stat-label">Max 7d-Limit</div>
          </div>
        </div>
      </section>

      <!-- Tagesverlauf -->
      <section class="card">
        <h2 class="card-title">5h-Limit Verlauf</h2>
        <div id="chart-wrapper" class="chart-wrapper">
          <div id="chart-y-axis" class="chart-y-axis">
            <span>100%</span>
            <span>75%</span>
            <span>50%</span>
            <span>25%</span>
            <span>0%</span>
          </div>
          <div class="chart-area">
            <div class="chart-container">
              <div class="chart-gridlines">
                <div class="chart-gridline"></div>
                <div class="chart-gridline"></div>
                <div class="chart-gridline"></div>
                <div class="chart-gridline"></div>
                <div class="chart-gridline"></div>
              </div>
              <div id="chart" class="chart-bars"></div>
            </div>
            <div id="chart-x-axis" class="chart-x-axis"></div>
          </div>
        </div>
      </section>

      <!-- Export -->
      <section class="card">
        <button id="btn-export" class="btn-secondary btn-full">
          Als JSON exportieren
        </button>
      </section>
    </main>
  </div>

  <script src="history.js"></script>
</body>
</html>
