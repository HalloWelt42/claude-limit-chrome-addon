<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Dashboard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Claude Dashboard</h1>
      <button id="btn-settings" class="btn-icon" title="Einstellungen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Status -->
    <div id="status-bar" class="status-bar hidden">
      <span id="status-text"></span>
    </div>

    <!-- 5-Stunden Limit -->
    <section class="section limit-section">
      <div class="limit-header">
        <span class="limit-title">⏱️ 5-Stunden Limit</span>
        <span id="reset-5h" class="reset-time"></span>
      </div>
      <div class="limit-bar-container">
        <div id="bar-5h" class="limit-bar" style="width: 0%"></div>
      </div>
      <div class="limit-value">
        <span id="percent-5h" class="percent">–</span>
        <span class="percent-label">% verbraucht</span>
      </div>
    </section>

    <!-- 7-Tage Limit -->
    <section class="section limit-section">
      <div class="limit-header">
        <span class="limit-title">📅 7-Tage Limit</span>
        <span id="reset-7d" class="reset-time"></span>
      </div>
      <div class="limit-bar-container">
        <div id="bar-7d" class="limit-bar" style="width: 0%"></div>
      </div>
      <div class="limit-value">
        <span id="percent-7d" class="percent">–</span>
        <span class="percent-label">% verbraucht</span>
      </div>
    </section>

    <!-- Modell-Limits (falls vorhanden) -->
    <section id="model-limits" class="section hidden">
      <h2 class="section-title">🤖 Modell-Limits</h2>
      <div id="model-list" class="model-list"></div>
    </section>

    <!-- Themen -->
    <section class="section">
      <h2 class="section-title">
        📝 Heutige Themen
        <span id="topic-count" class="topic-count"></span>
      </h2>
      <div id="topic-list" class="topic-list">
        <div class="empty-state">Keine Themen erfasst</div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <button id="btn-sync" class="btn-primary">🔄 Aktualisieren</button>
      <button id="btn-topics" class="btn-secondary">📋 Themen</button>
    </footer>

    <!-- Sync-Info -->
    <div class="sync-info">
      <span id="last-sync">Letzter Sync: –</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
